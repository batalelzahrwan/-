<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطل من الزهروان</title>
    <style>
        body {
            background-color: #0b132b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .header { text-align: center; margin-bottom: 60px; }
        .header h1 { color: #ff9800; font-size: 3em; text-shadow: 0 0 15px rgba(255, 152, 0, 0.7); margin: 0; }
        .header p { font-size: 1.2em; opacity: 0.8; }
        .circles-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; max-width: 1100px; }
        .category-circle {
            width: 320px; height: 320px; background-color: #1c2541;
            border: 4px solid #ff9800; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; box-shadow: 0 0 20px rgba(255, 152, 0, 0.2);
            transition: all 0.4s ease; padding: 20px; box-sizing: border-box;
        }
        .category-circle:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(255, 152, 0, 0.5); background-color: #243050; }
        .category-circle h3 { color: #ff9800; font-size: 1.4em; margin-bottom: 20px; border-bottom: 2px solid rgba(255, 152, 0, 0.3); padding-bottom: 10px; }
        .links-group { display: flex; flex-direction: column; gap: 10px; width: 80%; }
        .btn {
            background-color: #ff9800; color: #0b132b; border: none; padding: 8px 15px;
            border-radius: 20px; font-weight: bold; text-decoration: none; font-size: 0.9em;
        }
        /* ستايل دائرة الفورم */
        .form-circle { border-color: #673AB7; }
        .form-circle h3 { color: #673AB7; border-color: rgba(103, 58, 183, 0.3); }
        .form-circle .btn { background-color: #673AB7; color: #ffffff; }
    </style>
</head>
<body>

    <div class="header">
        <h1>بطل من الزهروان 💪🏻</h1>
        <p>المركز الرقمي الإرشادي لفريق بطل من الزهروان</p>
    </div>

    <div class="circles-container">

        <div class="category-circle">
            <h3>⚠️ نماذج الإنذارات</h3>
            <div class="links-group">
                <a href="https://drive.google.com/file/d/12OE6zi6jLDc06DL8BDjvemJe-iaDxunE/view?usp=sharing" target="_blank" class="btn">تحميل الإنذار الأول</a>
                <a href="https://drive.google.com/file/d/1R703FmFggYEiSLqX67AHiBi3NydsdXiK/view?usp=sharing" target="_blank" class="btn">تحميل الإنذار الثاني</a>
                <a href="https://drive.google.com/file/d/1h9ROX2ruWFp91pujnOnreg7AS-UjMb1S/view?usp=sharing" target="_blank" class="btn">تحميل الإنذار الثالث</a>
            </div>
        </div>

        <a href="https://forms.gle/phw7M8nVvVsDMCkf8" target="_blank" style="text-decoration: none;">
            <div class="category-circle form-circle">
                <h3>📝 التقارير الأسبوعية</h3>
                <div class="links-group">
                    <p style="font-size: 0.9em; margin-bottom: 15px;">فورم تسجيل الإنجاز الأسبوعي للميسرة</p>
                    <span class="btn">اضغط للفتح</span>
                </div>
            </div>
        </a>

        <div class="category-circle" style="border-style: dashed; opacity: 0.8;">
            <h3>📋 نماذج الاستبيانات</h3>
            <div class="links-group">
                <p style="font-size: 0.9em; color: #ff9800;">قريباً.. سيتم إضافة النماذج</p>
            </div>
        </div>

    </div>

</body>
</html>
